version: 1
repos:
  - name: web
    path: /path/to/web
    kind: nodejs
    monorepo:
      tool: nx
      affected_build: "nx affected -t build --base={base}"
      affected_lint: "nx affected -t lint --base={base}"
      affected_test: "nx affected -t test --base={base}"
      full_build: "nx run-many -t build --all"
      full_lint: "nx run-many -t lint --all"
      full_test: "nx run-many -t test --all"
